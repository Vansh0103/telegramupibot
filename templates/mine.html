<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ site_name }} - Mine Game</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:24px} .card{max-width:520px;margin:0 auto;background:#1e293b;border-radius:18px;padding:24px;box-shadow:0 14px 40px rgba(0,0,0,.35)} button{padding:12px 16px;border:0;border-radius:12px;background:#22c55e;color:#fff;font-weight:700;width:100%;margin-top:10px} input{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff} .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.tile{padding:18px;text-align:center;background:#334155;border-radius:12px}.muted{opacity:.8;font-size:14px}
</style></head><body><div class="card"><h1>💣 Mine Game</h1><p class="muted">Admin can fully control this game from the panel. This file is in <code>templates/mine.html</code> so you can edit the UI later.</p><label>Bet Amount (₹)</label><input id="bet" type="number" min="1" step="0.01" placeholder="Enter amount"><div class="grid"><div class="tile">💎</div><div class="tile">💣</div><div class="tile">🎁</div></div><button onclick="play()">Play Mine Game</button><p id="result" class="muted"></p></div><script>
async function play(){const params=new URLSearchParams(location.search);const user_id=params.get('user_id');const bet=parseFloat(document.getElementById('bet').value||'0');const res=await fetch('/api/games/mine/play',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id,bet})});const data=await res.json();document.getElementById('result').innerHTML=data.ok?`Result: <b>${data.win?'WIN':'LOSE'}</b><br>Bet: ₹${data.bet}<br>Reward: ₹${data.reward}<br>Balance: ₹${data.balance}`:data.message;}
</script></body></html>
